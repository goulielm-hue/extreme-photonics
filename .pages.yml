media:
  input: media
  output: /media

content:
  - name: homepage
    label: Homepage
    type: file
    path: _data/homepage.json
    fields:
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: title
            label: Main Title
            type: string
          - name: name
            label: Your Name
            type: string
          - name: affiliation
            label: Affiliation Line
            type: string
          - name: tagline
            label: Tagline
            type: string
          - name: portrait_url
            label: Portrait Image URL
            type: string
          - name: stats
            label: Key Numbers
            type: object[]
            fields:
              - name: value
                label: Number
                type: string
              - name: unit
                label: Unit
                type: string
              - name: label
                label: Description
                type: string

      - name: research_cards
        label: Research Cards
        type: object[]
        fields:
          - name: tag
            label: Tag / Category
            type: string
          - name: title
            label: Card Title
            type: string
          - name: description
            label: Description
            type: text
          - name: image
            label: Image URL
            type: string

      - name: highlight
        label: Latest Highlight
        type: object
        fields:
          - name: label
            label: Section Label
            type: string
          - name: title
            label: Headline
            type: string
          - name: text
            label: Body Text
            type: text
          - name: image
            label: Image URL
            type: string
          - name: meta1
            label: Metadata 1
            type: string
          - name: meta2
            label: Metadata 2
            type: string
          - name: meta3
            label: Metadata 3
            type: string

      - name: portals
        label: Quick Links / Portals
        type: object[]
        fields:
          - name: title
            label: Title
            type: string
          - name: description
            label: Description
            type: text
          - name: link
            label: Link URL
            type: string

  - name: team
    label: Team & Colleagues
    type: file
    path: _data/team.json
    fields:
      - name: page_title
        label: Page Title
        type: string
      - name: page_intro
        label: Page Introduction
        type: text

      - name: eras
        label: Eras / Time Periods
        type: object[]
        fields:
          - name: name
            label: Era Name
            type: string
          - name: years
            label: Years
            type: string
          - name: intro
            label: Introduction Text
            type: text
          - name: divider_text
            label: Divider Quote
            type: string
          - name: members
            label: Team Members
            type: object[]
            fields:
              - name: initials
                label: Initials
                type: string
              - name: name
                label: Full Name
                type: string
              - name: role
                label: Role / Position
                type: string
              - name: note
                label: Description
                type: text
              - name: now_at
                label: Now At (alumni only)
                type: string
              - name: is_leader
                label: Group Leader card?
                type: boolean

      - name: alumni_stats
        label: Alumni Statistics
        type: object[]
        fields:
          - name: number
            label: Number
            type: string
          - name: label
            label: Label
            type: string

      - name: constellation
        label: Collaborator Constellation
        type: object
        fields:
          - name: title
            label: Section Title
            type: string
          - name: intro
            label: Introduction
            type: text
          - name: collaborators
            label: Collaborators
            type: object[]
            fields:
              - name: name
                label: Name
                type: string
              - name: place
                label: Institution / Location
                type: string
